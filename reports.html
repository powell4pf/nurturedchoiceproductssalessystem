<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Frame-Options" content="DENY"><meta name="referrer" content="no-referrer">
  <title>Sales Reports — NurturedChoiceProducts</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="sidebar-root"></div>
<div class="app-layout">
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="page-title">Sales Reports</h1></div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
        <select class="form-control" id="report-month" style="width:auto;height:38px;font-size:0.875rem"></select>
        <button class="btn btn-outline" onclick="exportReport()">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
        <button class="btn btn-gold" onclick="printReport()">
          🖨️ Print Report
        </button>
      </div>
    </header>
    <div class="content-area">
      <div class="stats-grid" id="report-stats"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
        <div class="card animate-fade-up animate-delay-1">
          <div class="card-header"><h3 class="card-title">Revenue by Product</h3></div>
          <div class="card-body">
            <canvas id="product-revenue-chart" height="200"></canvas>
          </div>
        </div>
        <div class="card animate-fade-up animate-delay-2">
          <div class="card-header"><h3 class="card-title">Daily Sales Trend</h3></div>
          <div class="card-body">
            <canvas id="daily-chart" height="200"></canvas>
          </div>
        </div>
      </div>

      <div class="card animate-fade-up animate-delay-3" id="report-doc">
        <div class="card-header">
          <h3 class="card-title">Monthly Sales Report</h3>
          <span id="report-period" class="badge badge-info"></span>
        </div>
        <div class="card-body">
          <div class="doc-preview" style="border:none;padding:0" id="report-content"></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px">
        <div class="card animate-fade-up animate-delay-4">
          <div class="card-header"><h3 class="card-title">12-Month Comparison</h3></div>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Month</th><th>Invoices</th><th>Revenue</th><th>Credit Notes</th><th>Net</th></tr></thead>
              <tbody id="comparison-tbody"></tbody>
            </table>
          </div>
        </div>
        <div class="card animate-fade-up animate-delay-4">
          <div class="card-header"><h3 class="card-title">Top Customers (Selected Month)</h3></div>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Customer</th><th>Invoices</th><th>Total</th></tr></thead>
              <tbody id="top-customers-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script>
  async function init() {
    const session = await Auth.require();
    if (session.role !== 'admin') {
      window.location.href = 'dashboard.html';
      return;
    }
    document.getElementById('sidebar-root').innerHTML = renderSidebar();
    await initSidebar();
    populateMonthSelect();
    await renderReport();
  }
  init();

  function populateMonthSelect() {
    const sel = document.getElementById('report-month');
    const now = new Date();
    const months = [];
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push(d);
    }
    sel.innerHTML = months.map(d => {
      const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return `<option value="${val}">${d.toLocaleDateString('en-KE',{month:'long',year:'numeric'})}</option>`;
    }).join('');
    sel.addEventListener('change', renderReport);
  }

  async function getMonthData(monthVal) {
    const [year, month] = monthVal.split('-').map(Number);
    const invoices = (await DB.get('invoices')).filter(inv => {
      const d = new Date(inv.date || inv.createdAt);
      return d.getFullYear() === year && d.getMonth() === month - 1;
    });
    const creditNotes = (await DB.get('credit_notes')).filter(cn => {
      const d = new Date(cn.date || cn.createdAt);
      return d.getFullYear() === year && d.getMonth() === month - 1;
    });
    return { year, month, invoices, creditNotes };
  }

  async function exportReport() {
    const monthVal = document.getElementById('report-month').value;
    const { invoices } = await getMonthData(monthVal);
    const headers = ['Invoice #', 'Customer', 'Date', 'Amount', 'Status'];
    const rows = invoices.map(i => [i.number, i.customerName, i.date || i.createdAt, i.total, i.status]);
    Utils.downloadCSV(headers, rows, `Sales_Report_${monthVal}.csv`);
  }

  async function renderReport() {
    const monthVal = document.getElementById('report-month').value;
    const { year, month, invoices, creditNotes } = await getMonthData(monthVal);
    const products = await DB.get('products');

    const totalRevenue = invoices.reduce((s, i) => s + i.total, 0);
    const totalCredits = creditNotes.reduce((s, c) => s + c.total, 0);
    const netRevenue = totalRevenue - totalCredits;
    const paidInvoices = invoices.filter(i => i.status === 'paid');
    const pendingInvoices = invoices.filter(i => i.status === 'pending');
    const overdueInvoices = invoices.filter(i => i.status === 'overdue');

    // Product breakdown
    const productSales = {};
    invoices.forEach(inv => (inv.items||[]).forEach(item => {
      if (!productSales[item.productId]) productSales[item.productId] = { qty: 0, revenue: 0, name: item.name };
      productSales[item.productId].qty += item.qty;
      productSales[item.productId].revenue += item.qty * item.price;
    }));

    // Stats
    const monthName = new Date(year, month-1).toLocaleDateString('en-KE', { month: 'long', year: 'numeric' });
    document.getElementById('report-period').textContent = monthName;

    document.getElementById('report-stats').innerHTML = `
      <div class="stat-card animate-fade-up">
        <div class="stat-icon" style="background:#C6F6D5"><span style="font-size:1.5rem">💰</span></div>
        <div class="stat-value">${Fmt.currency(netRevenue)}</div>
        <div class="stat-label">Net Revenue</div>
      </div>
      <div class="stat-card animate-fade-up" style="animation-delay:0.05s">
        <div class="stat-icon" style="background:#BEE3F8"><span style="font-size:1.5rem">🧾</span></div>
        <div class="stat-value">${invoices.length}</div>
        <div class="stat-label">Total Invoices</div>
      </div>
      <div class="stat-card animate-fade-up" style="animation-delay:0.1s">
        <div class="stat-icon" style="background:#C6F6D5"><span style="font-size:1.5rem">✅</span></div>
        <div class="stat-value">${paidInvoices.length}</div>
        <div class="stat-label">Paid</div>
      </div>
      <div class="stat-card animate-fade-up" style="animation-delay:0.15s">
        <div class="stat-icon" style="background:#FEFCBF"><span style="font-size:1.5rem">⏳</span></div>
        <div class="stat-value">${pendingInvoices.length}</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card animate-fade-up" style="animation-delay:0.2s">
        <div class="stat-icon" style="background:#FED7D7"><span style="font-size:1.5rem">⚠️</span></div>
        <div class="stat-value">${overdueInvoices.length}</div>
        <div class="stat-label">Overdue</div>
      </div>
      <div class="stat-card animate-fade-up" style="animation-delay:0.25s">
        <div class="stat-icon" style="background:#FED7D7"><span style="font-size:1.5rem">📋</span></div>
        <div class="stat-value">${creditNotes.length}</div>
        <div class="stat-label">Credit Notes (${Fmt.currency(totalCredits)})</div>
      </div>
    `;

    // Report content (printable)
    const reportDocContent = `
      <div class="doc-preview">
        <div class="doc-header">
          <div class="doc-company">
            <div class="company-name">Sales Report</div>
            <div class="company-details">Monthly Analysis</div>
          </div>
          <div class="doc-meta">
            <div class="doc-type">Sales Report</div>
            <div class="doc-number">${monthName}</div>
            <div class="doc-date">Generated: ${Fmt.date(new Date().toISOString())}</div>
          </div>
        </div>
        <hr class="doc-divider">
        <h4 style="font-family:'Playfair Display',serif;color:var(--forest);margin-bottom:12px">Product Performance</h4>
        <table class="doc-table" style="width:100%;border-collapse:collapse;margin-bottom:24px">
          <thead><tr>
            <th style="padding:10px 14px;text-align:left">Product</th>
            <th style="padding:10px 14px;text-align:center">Units Sold</th>
            <th style="padding:10px 14px;text-align:right">Revenue</th>
            <th style="padding:10px 14px;text-align:right">% of Total</th>
          </tr></thead>
          <tbody>
            ${products.map(p => {
              const s = productSales[p.id] || { qty: 0, revenue: 0 };
              const pct = totalRevenue ? (s.revenue / totalRevenue * 100) : 0;
              return `<tr>
                <td>${Fmt.escape(p.emoji)} ${Fmt.escape(p.name)}</td>
                <td style="text-align:center">${s.qty}</td>
                <td style="text-align:right"><strong>${Fmt.currency(s.revenue)}</strong></td>
                <td style="text-align:right">${pct.toFixed(1)}%</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>

        <div class="doc-totals">
          <table class="doc-totals-table">
            <tr><td style="color:var(--muted)">Gross Sales</td><td>${Fmt.currency(totalRevenue)}</td></tr>
            <tr><td style="color:var(--danger)">Less: Credit Notes</td><td style="color:var(--danger)">(${Fmt.currency(totalCredits)})</td></tr>
            <tr>
              <td style="font-weight:700;color:var(--forest);font-family:'Playfair Display',serif;font-size:1.1rem;border-top:2px solid var(--forest);padding-top:8px">NET REVENUE</td>
              <td style="font-weight:700;color:var(--forest);font-family:'Playfair Display',serif;font-size:1.1rem;border-top:2px solid var(--forest);padding-top:8px;text-align:right">${Fmt.currency(netRevenue)}</td>
            </tr>
          </table>
        </div>
        <div class="doc-footer">NurturedChoiceProducts — Internal sales report for ${monthName}.</div>
      </div>
    `;
    
    document.getElementById('report-content').innerHTML = Letterhead.wrap(reportDocContent);

    await drawProductRevenueChart(productSales, products);
    await drawDailyChart(invoices, year, month);
    await renderComparison();
    await renderTopCustomers(invoices);
  }

  async function drawProductRevenueChart(productSales, products) {
    const canvas = document.getElementById('product-revenue-chart');
    const ctx = canvas.getContext('2d');
    const W = canvas.offsetWidth || 400, H = 200;
    canvas.width = W; canvas.height = H;
    ctx.clearRect(0,0,W,H);

    const data = products.map(p => ({ name: p.name.split(' ').slice(0,2).join(' '), value: (productSales[p.id]||{revenue:0}).revenue }));
    const max = Math.max(...data.map(d=>d.value), 100);
    const pad = { l: 100, r: 30, t: 10, b: 10 };
    const barH = (H - pad.t - pad.b) / data.length * 0.5;
    const gap = (H - pad.t - pad.b) / data.length;

    data.forEach((d, i) => {
      const y = pad.t + gap * i + (gap-barH)/2;
      const w = (d.value/max) * (W - pad.l - pad.r);
      const grad = ctx.createLinearGradient(pad.l, 0, pad.l + w, 0);
      grad.addColorStop(0, '#1A3C2E'); grad.addColorStop(1, '#C9A84C');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(pad.l, y, Math.max(w,2), barH, [0,6,6,0]) : ctx.rect(pad.l, y, w, barH);
      ctx.fill();
      ctx.fillStyle = '#1C1C1C'; ctx.font = '12px Inter'; ctx.textAlign = 'right';
      ctx.fillText(d.name, pad.l - 8, y + barH/2 + 4);
      ctx.fillStyle = '#1A3C2E'; ctx.font = 'bold 11px Inter'; ctx.textAlign = 'left';
      ctx.fillText(Fmt.currency(d.value), pad.l + w + 6, y + barH/2 + 4);
    });
  }

  async function drawDailyChart(invoices, year, month) {
    const canvas = document.getElementById('daily-chart');
    const ctx = canvas.getContext('2d');
    const W = canvas.offsetWidth || 400, H = 200;
    canvas.width = W; canvas.height = H;
    ctx.clearRect(0,0,W,H);

    const daysInMonth = new Date(year, month, 0).getDate();
    const dailyTotals = new Array(daysInMonth).fill(0);
    invoices.forEach(inv => {
      const d = new Date(inv.date || inv.createdAt);
      dailyTotals[d.getDate()-1] += inv.total;
    });

    const max = Math.max(...dailyTotals, 100);
    const pad = { l: 50, r: 10, t: 10, b: 24 };
    const chartW = W - pad.l - pad.r, chartH = H - pad.t - pad.b;

    // grid
    ctx.strokeStyle = 'rgba(26,60,46,0.06)';
    for (let i=0;i<=4;i++) {
      const y = pad.t + chartH/4*i;
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
      ctx.fillStyle='#718096'; ctx.font='9px Inter'; ctx.textAlign='right';
      ctx.fillText(Fmt.currency(max*(1-i/4),'').replace('.00',''), pad.l-4, y+3);
    }

    // line
    ctx.beginPath();
    ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 2;
    dailyTotals.forEach((v,i) => {
      const x = pad.l + (chartW/(daysInMonth-1||1))*i;
      const y = pad.t + chartH - (v/max)*chartH;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();

    // fill
    ctx.lineTo(pad.l+chartW, pad.t+chartH);
    ctx.lineTo(pad.l, pad.t+chartH);
    ctx.closePath();
    ctx.fillStyle = 'rgba(201,168,76,0.12)';
    ctx.fill();

    // x labels (every 5 days)
    ctx.fillStyle = '#718096'; ctx.font = '9px Inter'; ctx.textAlign = 'center';
    for (let d=1; d<=daysInMonth; d+=5) {
      const x = pad.l + (chartW/(daysInMonth-1||1))*(d-1);
      ctx.fillText(d, x, H-6);
    }
  }

  async function renderComparison() {
    const now = new Date();
    const rows = [];
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const data = await getMonthData(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
      const { invoices, creditNotes } = data;
      const rev = invoices.reduce((s,i)=>s+i.total,0);
      const cred = creditNotes.reduce((s,c)=>s+c.total,0);
      rows.push({ month: d.toLocaleDateString('en-KE',{month:'short',year:'numeric'}), count: invoices.length, rev, cred, net: rev-cred });
    }
    document.getElementById('comparison-tbody').innerHTML = rows.map(r => `
      <tr>
        <td>${r.month}</td>
        <td>${r.count}</td>
        <td>${Fmt.currency(r.rev)}</td>
        <td style="color:var(--danger)">${r.cred?`(${Fmt.currency(r.cred)})`:'—'}</td>
        <td><strong>${Fmt.currency(r.net)}</strong></td>
      </tr>
    `).join('');
  }

  function renderTopCustomers(invoices) {
    const totals = {};
    invoices.forEach(inv => {
      const key = inv.customerName || 'Walk-in';
      if (!totals[key]) totals[key] = { count: 0, total: 0 };
      totals[key].count++;
      totals[key].total += inv.total;
    });
    const sorted = Object.entries(totals).sort((a,b) => b[1].total - a[1].total).slice(0, 10);
    const tbody = document.getElementById('top-customers-tbody');
    if (!sorted.length) {
      tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:20px">No sales this month</td></tr>`;
      return;
    }
    tbody.innerHTML = sorted.map(([name, d]) => `
      <tr><td>${Fmt.escape(name)}</td><td>${d.count}</td><td><strong>${Fmt.currency(d.total)}</strong></td></tr>
    `).join('');
  }

  function printReport() {
    const el = document.getElementById('report-content');
    const win = window.open('', '_blank', 'width=850,height=700');
    win.document.write(`<!DOCTYPE html><html><head><title>Sales Report</title>
      <link rel="stylesheet" href="css/style.css">
      <style>
        body { background:white; padding:20mm 15mm; margin:0; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      </style>
      </head><body>${el.innerHTML}</body></html>`);
    win.document.close();
    win.onload = () => { win.focus(); win.print(); win.close(); };
  }
</script>
</body>
</html>
