<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="NurturedChoiceProducts Sales System Registration">
  <!-- Security headers via meta -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://mhmzhasantibedfllvcu.supabase.co wss://mhmzhasantibedfllvcu.supabase.co;">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="no-referrer">
  <title>Register — NurturedChoiceProducts</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="auth-page" id="auth-page">
    <div class="auth-bg-orb"></div>
    <div class="auth-bg-orb"></div>
    <div class="auth-bg-orb"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
            <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/>
          </svg>
        </div>
        <h1>NurturedChoice<br>Products</h1>
        <p>Staff Registration</p>
      </div>

      <div class="auth-error" id="auth-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="auth-error-msg"></span>
      </div>

      <form id="register-form" novalidate autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="full-name">Full Name</label>
          <input class="form-control" type="text" id="full-name" placeholder="e.g. Jane Doe" maxlength="100" required aria-label="Full Name">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-control" type="email" id="email" placeholder="staff@example.com" maxlength="50" required aria-label="Email Address">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" placeholder="Enter password" maxlength="100" required aria-label="Password">
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn" style="margin-top:8px">
          <span id="register-btn-text">Register Account</span>
          <span id="register-spinner" class="spinner hidden" style="width:18px;height:18px;border-color:rgba(255,255,255,0.3);border-top-color:white"></span>
        </button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:0.8rem;color:var(--muted)">
        Already have an account? <a href="index.html" style="color:var(--forest);font-weight:600">Sign In</a>
      </p>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const form = document.getElementById('register-form');
    const errorBox = document.getElementById('auth-error');
    const errorMsg = document.getElementById('auth-error-msg');
    const btnText = document.getElementById('register-btn-text');
    const spinner = document.getElementById('register-spinner');
    const registerBtn = document.getElementById('register-btn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.add('show');
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorBox.classList.remove('show');

      const fullName = document.getElementById('full-name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!fullName || !email || !password) { showError('Please fill in all fields.'); return; }
      if (!Security.validateInput(email, 'email')) { showError('Please enter a valid email address.'); return; }
      if (password.length < 6) { showError('Password must be at least 6 characters long.'); return; }

      btnText.textContent = 'Registering…';
      spinner.classList.remove('hidden');
      registerBtn.disabled = true;

      try {
        const result = await Auth.register(email, password, fullName);
        if (result.ok) {
          Toast.success('Registration successful! You can now sign in.');
          setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        } else {
          showError(result.msg);
          btnText.textContent = 'Register Account';
          spinner.classList.add('hidden');
          registerBtn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        showError('An unexpected error occurred. Please try again.');
        btnText.textContent = 'Register Account';
        spinner.classList.add('hidden');
        registerBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
