<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Frame-Options" content="DENY"><meta name="referrer" content="no-referrer">
  <title>Customers — NurturedChoiceProducts</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="sidebar-root"></div>
<div class="app-layout">
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="page-title">Customers</h1></div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
        <div class="search-bar">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search customers…">
        </div>
        <button class="btn btn-primary" onclick="openNewCustomer()">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Customer
        </button>
      </div>
    </header>
    <div class="content-area">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Customer Directory</h3>
          <span class="badge badge-neutral" id="cust-count">0</span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Invoices</th>
                <th>Total Spent</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="cust-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Customer Modal -->
<div class="modal-overlay" id="customer-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="customer-modal-title">Add Customer</h3>
      <button class="modal-close" onclick="Modal.close('customer-modal')">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Full Name / Company Name</label>
        <input class="form-control" type="text" id="c-name" maxlength="100" placeholder="e.g. Jane Wanjiku">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Email (optional)</label>
          <input class="form-control" type="email" id="c-email" maxlength="100" placeholder="customer@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Phone (optional)</label>
          <input class="form-control" type="text" id="c-phone" maxlength="20" placeholder="+254 7XX XXX XXX">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address (optional)</label>
        <textarea class="form-control" id="c-address" rows="2" maxlength="200" placeholder="Physical / postal address"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="Modal.close('customer-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCustomer()">Save Customer</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script>
  async function init() {
    document.getElementById('sidebar-root').innerHTML = renderSidebar();
    await initSidebar();
    await renderCustomers();
  }
  init();

  let editingCustomerId = null;
  let searchQuery = '';

  async function renderCustomers() {
    let customers = await DB.get('customers');
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      customers = customers.filter(c => c.name.toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q) || (c.phone||'').includes(q));
    }
    document.getElementById('cust-count').textContent = `${customers.length} customer(s)`;

    const invoices = await DB.get('invoices');
    const tbody = document.getElementById('cust-tbody');

    if (!customers.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👥</div><h3>No customers found</h3><p>Add a customer to start invoicing them</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = customers.map(c => {
      const custInvoices = invoices.filter(i => i.customerId === c.id);
      const totalSpent = custInvoices.reduce((s, i) => s + i.total, 0);
      const isDefault = c.id === 'c1';
      return `
        <tr>
          <td><strong>${Fmt.escape(c.name)}</strong>${isDefault?' <span class="badge badge-neutral">Default</span>':''}</td>
          <td>${Fmt.escape(c.email||'—')}</td>
          <td>${Fmt.escape(c.phone||'—')}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${Fmt.escape(c.address||'—')}</td>
          <td>${custInvoices.length}</td>
          <td><strong>${Fmt.currency(totalSpent)}</strong></td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn btn-outline btn-sm" onclick="openEditCustomer('${c.id}')">Edit</button>
              ${!isDefault ? `<button class="btn btn-sm" style="color:var(--danger);background:var(--danger-light);border:none" onclick="deleteCustomer('${c.id}')">🗑</button>` : ''}
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  function openNewCustomer() {
    editingCustomerId = null;
    document.getElementById('customer-modal-title').textContent = 'Add Customer';
    ['c-name','c-email','c-phone','c-address'].forEach(id => document.getElementById(id).value = '');
    Modal.open('customer-modal');
  }

  async function openEditCustomer(id) {
    const c = await DB.findById('customers', id);
    if (!c) return;
    editingCustomerId = id;
    document.getElementById('customer-modal-title').textContent = `Edit ${c.name}`;
    document.getElementById('c-name').value = c.name;
    document.getElementById('c-email').value = c.email || '';
    document.getElementById('c-phone').value = c.phone || '';
    document.getElementById('c-address').value = c.address || '';
    Modal.open('customer-modal');
  }

  async function saveCustomer() {
    const name = document.getElementById('c-name').value.trim();
    const email = document.getElementById('c-email').value.trim();
    const phone = document.getElementById('c-phone').value.trim();
    const address = document.getElementById('c-address').value.trim();

    if (!name) { Toast.error('Customer name is required.'); return; }
    if (email && !Security.validateInput(email, 'email')) { Toast.error('Please enter a valid email address.'); return; }
    if (phone && !Security.validateInput(phone, 'phone')) { Toast.error('Please enter a valid phone number.'); return; }

    const data = {
      name: Security.sanitize(name),
      email: Security.sanitize(email),
      phone: Security.sanitize(phone),
      address: Security.sanitize(address)
    };

    if (editingCustomerId) {
      const session = await Auth.getSession();
      await DB.update('customers', editingCustomerId, data);
      await DB.log('UPDATE_CUSTOMER', `Updated customer ${name}`, session ? session.userId : null);
      Toast.success(`${name} updated.`);
    } else {
      const session = await Auth.getSession();
      await DB.insert('customers', data);
      await DB.log('CREATE_CUSTOMER', `Added customer ${name}`, session ? session.userId : null);
      Toast.success(`${name} added.`);
    }
    Modal.close('customer-modal');
    await renderCustomers();
  }

  async function deleteCustomer(id) {
    const c = await DB.findById('customers', id);
    if (!c) return;
    const hasInvoices = (await DB.get('invoices')).some(i => i.customerId === id);
    if (hasInvoices) {
      Toast.warning(`Cannot remove ${c.name} — they have existing invoices. Historical records are preserved.`);
      return;
    }
    confirmAction(`Remove customer "${c.name}"?`, async () => {
      await DB.delete('customers', id);
      const session = await Auth.getSession();
      await DB.log('DELETE_CUSTOMER', `Removed customer ${c.name}`, session ? session.userId : null);
      Toast.success(`${c.name} removed.`);
      await renderCustomers();
    });
  }

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderCustomers();
  });
</script>
</body>
</html>
