<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Frame-Options" content="DENY"><meta name="referrer" content="no-referrer">
  <title>User Management — NurturedChoiceProducts</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="sidebar-root"></div>
<div class="app-layout">
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="page-title">User Management</h1></div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </header>
    <div class="content-area">
      <div class="card animate-fade-up">
        <div class="card-header">
          <h3 class="card-title">Staff Profiles</h3>
          <span class="badge badge-neutral" id="user-count">0 member(s)</span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Joined</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody"></tbody>
          </table>
        </div>
      </div>
      
      <div class="alert alert-info mt-4">
        <strong>Pro Tip:</strong> New staff members should register via your sign-up page. Once they join, their profile will appear here, and you can upgrade them from "Staff" to "Admin."
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script>
  async function init() {
    const session = await Auth.require();
    if (session.role !== 'admin') {
      window.location.href = 'dashboard.html';
      return;
    }
    document.getElementById('sidebar-root').innerHTML = renderSidebar();
    await initSidebar();
    await renderUsers();
  }
  init();

  async function renderUsers() {
    const users = await DB.get('profiles');
    document.getElementById('user-count').textContent = `${users.length} member(s)`;
    const tbody = document.getElementById('users-tbody');
    
    if (!users.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted" style="padding:32px">No users found.</td></tr>`;
      return;
    }

    tbody.innerHTML = users.map(u => `
      <tr>
        <td><strong>${Fmt.escape(u.full_name || '—')}</strong></td>
        <td>${Fmt.escape(u.email || '—')}</td>
        <td>
          <select class="form-control" style="width:auto;height:32px;font-size:0.8rem;padding:0 24px 0 8px" 
            onchange="updateUserRole('${u.id}', this.value)">
            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
            <option value="staff" ${u.role === 'staff' ? 'selected' : ''}>Staff</option>
          </select>
        </td>
        <td>${Fmt.date(u.created_at)}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="updateUserName('${u.id}', '${Fmt.escape(u.full_name)}')">Rename</button>
        </td>
      </tr>
    `).join('');
  }

  async function updateUserRole(id, role) {
    const result = await DB.update('profiles', id, { role });
    if (result) {
      Toast.success('Role updated successfully.');
      // If you changed your own role, refresh to apply changes
      const session = await Auth.getSession();
      if (session.userId === id) {
        setTimeout(() => window.location.reload(), 1000);
      }
    } else {
      Toast.error('Failed to update role. Check admin permissions.');
    }
  }

  async function updateUserName(id, currentName) {
    const newName = prompt("Change name for this user:", currentName);
    if (newName && newName !== currentName) {
      await DB.update('profiles', id, { full_name: newName });
      Toast.success('Name updated.');
      await renderUsers();
    }
  }
</script>
</body>
</html>
